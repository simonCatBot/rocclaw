name: Build and Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Create distribution package
        run: |
          mkdir -p dist/rocclaw
          cp -r .next dist/rocclaw/
          cp -r server dist/rocclaw/
          cp package.json dist/rocclaw/
          cp package-lock.json dist/rocclaw/
          cp next.config.ts dist/rocclaw/
          cp -r public dist/rocclaw/
          cp README.md dist/rocclaw/
          cp LICENSE dist/rocclaw/
          cp .env.example dist/rocclaw/
          mkdir -p dist/rocclaw/scripts
          cp scripts/verify-native-runtime.mjs dist/rocclaw/scripts/
          
          # Create startup script
          cat > dist/rocclaw/start.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Starting rocCLAW..."
          echo "Make sure you have Node.js 20.9+ installed"
          
          # Install production dependencies
          npm ci --production
          
          # Start the server
          node server/index.js
          EOF
          chmod +x dist/rocclaw/start.sh
          
          # Create Windows startup script
          cat > dist/rocclaw/start.bat << 'EOF'
          @echo off
          echo Starting rocCLAW...
          echo Make sure you have Node.js 20.9+ installed
          
          REM Install production dependencies
          call npm ci --production
          
          REM Start the server
          node server/index.js
          EOF
          
          # Create tar.gz archive
          cd dist
          tar -czf rocclaw-linux-x64.tar.gz rocclaw
          
          # Create zip archive
          zip -r rocclaw-windows-x64.zip rocclaw

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocclaw-build
          path: dist/*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rocclaw-build
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rocclaw-linux-x64.tar.gz
            dist/rocclaw-windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
